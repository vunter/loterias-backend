spring:
  application:
    name: loterias-analyzer
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  threads:
    virtual:
      enabled: true

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 100
        order_inserts: true
        order_updates: true

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    validate-on-migrate: true

loterias:
  sync:
    enabled: true
    cron: "0 0 1 * * *"

# Observability endpoints — externalized
observability:
  loki:
    url: ${LOKI_URL:http://localhost:3100}
  prometheus:
    url: ${PROMETHEUS_URL:http://localhost:9090}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
    disable-swagger-default-url: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: never
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
      service: ${DD_SERVICE:loterias}
      env: ${DD_ENV:prod}
      version: ${DD_VERSION:0.0.1}
    distribution:
      percentiles-histogram:
        http.server.requests: true
  prometheus:
    metrics:
      export:
        enabled: true
  datadog:
    metrics:
      export:
        enabled: ${DATADOG_ENABLED:false}
        api-key: ${DATADOG_API_KEY:}
        uri: https://api.${DATADOG_SITE:datadoghq.com}
        step: 30s
        descriptions: false
        host-tag: instance
  tracing:
    sampling:
      probability: ${TRACING_SAMPLING_PROBABILITY:0.1}
  info:
    env:
      enabled: true

info:
  app:
    name: Loterias Analyzer
    version: 1.0.0
    description: API para análise de loterias brasileiras

---
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/loterias}
    username: ${DATABASE_USERNAME:loterias_app}
    password: ${DATABASE_PASSWORD:?DATABASE_PASSWORD must be set}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
